spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/memora_db}
    username: ${DB_USERNAME:memora_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect